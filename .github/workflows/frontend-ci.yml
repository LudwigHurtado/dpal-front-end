# Front-end CI — lint, build, and Playwright E2E (including Visible Autopilot).
# Playwright runs headless when CI=true (default on GitHub Actions).

name: Front-end CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run Playwright E2E
        run: npm run test:e2e
